<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .card {
      background: white;
      padding: 28px;
      border-radius: 16px;
      max-width: 860px;
      margin: 30px auto;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      background: #fff3cd;
      color: #856404;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .lang-box {
      text-align: right;
    }

    .lang-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      background: white;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 34px;
      line-height: 1.2;
    }

    .intro {
      font-size: 16px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 28px;
    }

    .meta {
      font-size: 14px;
      color: #777;
      margin-bottom: 8px;
    }

    .question-title {
      font-size: 26px;
      margin: 0 0 10px 0;
    }

    .scenario {
      font-size: 20px;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .story-card {
      display: none;
      background: #f7f9fc;
      border: 1px solid #d9e2ef;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .story-label {
      display: inline-block;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #e8f2fc;
      color: #2b6cb0;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .story-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .story-line {
      line-height: 1.75;
      margin-bottom: 8px;
      color: #333;
    }

    .question-type {
      display: inline-block;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eef3f8;
      color: #4a5568;
      margin-bottom: 18px;
    }

    .question-hint {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }

    .option-btn {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      font-size: 17px;
      transition: 0.2s ease;
      text-align: left;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .option-btn:hover {
      background: #f3f3f3;
    }

    .option-btn:disabled {
      cursor: default;
      opacity: 0.95;
    }

    .option-letter {
      font-weight: bold;
      min-width: 24px;
    }

    .option-selected {
      border-color: #0078d4;
      background: #e8f2fc;
    }

    .option-correct {
      border-color: #28a745;
      background: #d4edda;
    }

    .option-wrong {
      border-color: #dc3545;
      background: #f8d7da;
    }

    .answer-action {
      margin-top: 14px;
      margin-bottom: 8px;
    }

    .action-btn {
      padding: 12px 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      background: #0078d4;
      color: white;
    }

    .action-btn:hover {
      background: #106ebe;
    }

    .action-btn:disabled {
      background: #9bbfe3;
      cursor: not-allowed;
    }

    .result {
      margin-top: 22px;
      padding: 16px;
      border-radius: 10px;
      line-height: 1.8;
      font-size: 16px;
      display: none;
    }

    .correct {
      background: #d4edda;
      color: #155724;
      border: 1px solid #b7dfbf;
      display: block;
    }

    .wrong {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #efb5ba;
      display: block;
    }

    .info {
      background: #e8f4fd;
      color: #0c5460;
      border: 1px solid #b8daff;
      display: block;
    }

    .reminder {
      margin-top: 8px;
      font-weight: bold;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .nav-btn {
      flex: 1;
      min-width: 120px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .nav-btn.primary {
      background: #0078d4;
      color: white;
    }

    .nav-btn.primary:hover {
      background: #106ebe;
    }

    .nav-btn.secondary {
      background: #eaeaea;
      color: #333;
    }

    .nav-btn.secondary:hover {
      background: #dcdcdc;
    }

    .summary {
      margin-top: 24px;
      font-size: 15px;
      color: #666;
      text-align: right;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 14px;
      color: #666;
      text-align: center;
      border-top: 1px solid #eee;
      padding-top: 16px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
      }

      .question-title {
        font-size: 22px;
      }

      .scenario {
        font-size: 18px;
      }

      .option-btn {
        font-size: 16px;
      }

      .lang-box {
        text-align: left;
      }

      .story-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <div>
        <div class="badge" id="badge"></div>
      </div>

      <div class="lang-box">
        <div class="lang-label" id="langLabel">Language / 語言 / 语言</div>
        <select id="langSelect">
          <option value="zh-HK">繁體中文</option>
          <option value="zh-CN">简体中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <h1 id="siteTitle"></h1>
    <div class="intro" id="intro"></div>

    <div class="meta" id="meta"></div>
    <h2 class="question-title" id="title"></h2>

    <div id="storyCard" class="story-card">
      <div class="story-label" id="storyLabel"></div>
      <div class="story-title" id="storyTitle"></div>
      <div id="storyContent"></div>
    </div>

    <div class="scenario" id="question"></div>
    <div class="question-type" id="questionType"></div>
    <div class="question-hint" id="questionHint"></div>

    <div id="answers"></div>

    <div class="answer-action" id="answerAction" style="display:none;">
      <button id="checkBtn" class="action-btn"></button>
    </div>

    <div id="result" class="result"></div>

    <div class="controls">
      <button class="nav-btn primary" id="nextBtn"></button>
    </div>

    <div class="summary" id="summary"></div>
    <div id="finalResult" class="result"></div>

    <div class="footer-note" id="footer"></div>
  </div>

  <script>
    let quizData = null;
    let currentLang = "zh-HK";
    let current = 0;
    let answersState = {};
    let showingFinal = false;

    function getScore() {
      if (!quizData) return 0;
      let score = 0;

      quizData.questions.forEach(q => {
        const state = answersState[q.id];
        if (state && state.submitted && isAnswerCorrect(q, state.selected)) {
          score++;
        }
      });

      return score;
    }

    function getAnsweredCount() {
      return Object.values(answersState).filter(s => s && s.submitted).length;
    }

    function allAnswered() {
      return quizData && getAnsweredCount() === quizData.questions.length;
    }

    function getUIText(key) {
      return quizData.ui[currentLang][key];
    }

    function updateLanguageInUrl(lang) {
      const url = new URL(window.location);
      url.searchParams.set("lang", lang);
      window.history.replaceState({}, "", url);
    }

    function getQuestionState(questionId) {
      if (!answersState[questionId]) {
        answersState[questionId] = {
          selected: [],
          submitted: false
        };
      }
      return answersState[questionId];
    }

    function getCorrectIndexes(question) {
      const indexes = [];
      question.options.forEach((opt, i) => {
        if (opt.correct) indexes.push(i);
      });
      return indexes;
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      const sortedA = [...a].sort((x, y) => x - y);
      const sortedB = [...b].sort((x, y) => x - y);
      return sortedA.every((v, i) => v === sortedB[i]);
    }

    function isAnswerCorrect(question, selectedIndexes) {
      const correctIndexes = getCorrectIndexes(question);
      return arraysEqual(selectedIndexes, correctIndexes);
    }

    function applyLanguageUI() {
      const ui = quizData.ui[currentLang];
      document.title = ui.siteTitle;
      document.documentElement.lang = currentLang;

      document.getElementById("badge").innerText = ui.badge;
      document.getElementById("siteTitle").innerText = ui.siteTitle;
      document.getElementById("intro").innerText = ui.intro;
      document.getElementById("nextBtn").innerText = ui.next;
      document.getElementById("footer").innerText = ui.footer;
      document.getElementById("langSelect").value = currentLang;
      document.getElementById("langLabel").innerText = ui.langLabel || "Language / 語言 / 语言";
      document.getElementById("checkBtn").innerText = ui.checkAnswer;
    }

    function updateSummary() {
      const score = getScore();
      document.getElementById("summary").innerHTML = `${getUIText("scoreLabel")}：${score} / ${quizData.questions.length}`;
    }

    function hideResult() {
      const box = document.getElementById("result");
      box.className = "result";
      box.innerHTML = "";
      box.style.display = "none";
    }

    function showResult(question, selectedIndexes) {
      const resultBox = document.getElementById("result");
      const correct = isAnswerCorrect(question, selectedIndexes);

      if (correct) {
        resultBox.className = "result correct";
        resultBox.innerHTML = `
          ${getUIText("correctLabel")}<br>
          ${question.explanation[currentLang]}
          <div class="reminder">${getUIText("reminderLabel")}：${question.reminder[currentLang]}</div>
        `;
      } else {
        resultBox.className = "result wrong";
        resultBox.innerHTML = `
          ${getUIText("wrongLabel")}<br>
          ${question.explanation[currentLang]}
          <div class="reminder">${getUIText("reminderLabel")}：${question.reminder[currentLang]}</div>
        `;
      }

      resultBox.style.display = "block";
    }

    function getEncouragementMessage() {
      const total = quizData.questions.length;
      const score = getScore();
      const ratio = score / total;

      if (score === total) {
        return quizData.messages.perfect[currentLang];
      } else if (ratio >= 0.7) {
        return quizData.messages.pass70[currentLang];
      } else {
        return quizData.messages.below70[currentLang];
      }
    }

    function showFinalResult() {
      const box = document.getElementById("finalResult");
      if (!box) return;

      showingFinal = true;

      document.getElementById("meta").innerHTML = "";
      document.getElementById("title").innerHTML = getUIText("resultTitle");
      document.getElementById("question").innerHTML = "";
      document.getElementById("questionType").innerHTML = "";
      document.getElementById("questionHint").innerHTML = "";
      document.getElementById("answers").innerHTML = "";
      document.getElementById("answerAction").style.display = "none";
      document.getElementById("storyCard").style.display = "none";
      hideResult();

      const total = quizData.questions.length;
      const score = getScore();
      const scorePercent = Math.round((score / total) * 100);

      box.className = "result info";
      box.innerHTML = `
        <strong>${getUIText("resultTitle")}</strong><br>
        ${getUIText("scoreLabel")}：${score} / ${total} (${scorePercent}%)<br><br>
        ${getEncouragementMessage()}
      `;
      box.style.display = "block";

      document.getElementById("prevBtn").innerText = getUIText("restart");
      document.getElementById("nextBtn").innerText = getUIText("restart");
      updateSummary();
    }

    function hideFinalResult() {
      const box = document.getElementById("finalResult");
      if (!box) return;

      box.className = "result";
      box.innerHTML = "";
      box.style.display = "none";
      showingFinal = false;
    }

    function getOptionLetter(index) {
      return ["A", "B", "C", "D", "E", "F"][index] || `${index + 1}`;
    }

    function renderPresentation(question) {
      const storyCard = document.getElementById("storyCard");
      const questionBox = document.getElementById("question");

      if (question.presentation === "scenario" && question.story && question.story[currentLang]) {
        const story = question.story[currentLang];

        document.getElementById("storyLabel").innerText =
          story.label || getUIText("scenarioLabelDefault");
        document.getElementById("storyTitle").innerText = story.title || "";

        const storyContentBox = document.getElementById("storyContent");
        storyContentBox.innerHTML = "";

        if (Array.isArray(story.content)) {
          story.content.forEach(line => {
            const div = document.createElement("div");
            div.className = "story-line";
            div.textContent = line;
            storyContentBox.appendChild(div);
          });
        }

        storyCard.style.display = "block";
        questionBox.innerHTML = question.question[currentLang];
      } else {
        storyCard.style.display = "none";
        questionBox.innerHTML = question.scenario[currentLang];
      }
    }

    function renderQuestion() {
      const question = quizData.questions[current];
      if (!question) return;

      hideFinalResult();
      applyLanguageUI();

      const state = getQuestionState(question.id);
      const alreadySubmitted = state.submitted;

      const questionLabel = getUIText("questionLabel")
        .replace("{current}", current + 1)
        .replace("{total}", quizData.questions.length);

      document.getElementById("meta").innerHTML = `${questionLabel} ・ ${question.category[currentLang]}`;
      document.getElementById("title").innerHTML = question.title[currentLang];

      renderPresentation(question);

      document.getElementById("questionType").innerHTML =
        question.type === "multiple"
          ? getUIText("multipleLabel")
          : getUIText("singleLabel");

      document.getElementById("questionHint").innerHTML =
        question.type === "multiple"
          ? getUIText("multipleHint")
          : getUIText("singleHint");

      let html = "";
      const correctIndexes = getCorrectIndexes(question);

      question.options.forEach((opt, i) => {
        let classes = ["option-btn"];

        if (state.selected.includes(i)) {
          classes.push("option-selected");
        }

        if (alreadySubmitted) {
          if (correctIndexes.includes(i)) {
            classes.push("option-correct");
          } else if (state.selected.includes(i) && !correctIndexes.includes(i)) {
            classes.push("option-wrong");
          }
        }

        html += `
          <button class="${classes.join(" ")}" onclick="selectOption(${i})" ${alreadySubmitted ? "disabled" : ""}>
            <span class="option-letter">${getOptionLetter(i)}.</span>
            <span>${opt.text[currentLang]}</span>
          </button>
        `;
      });

      document.getElementById("answers").innerHTML = html;

      if (question.type === "multiple" && !alreadySubmitted) {
        document.getElementById("answerAction").style.display = "block";
        document.getElementById("checkBtn").disabled = state.selected.length === 0;
      } else {
        document.getElementById("answerAction").style.display = "none";
      }

      if (alreadySubmitted) {
        showResult(question, state.selected);
      } else {
        hideResult();
      }

      updateSummary();

      if (allAnswered() && current === quizData.questions.length - 1) {
        document.getElementById("nextBtn").innerText = getUIText("finish");
      } else {
        document.getElementById("nextBtn").innerText = getUIText("next");
      }
    }

    function selectOption(index) {
      const question = quizData.questions[current];
      const state = getQuestionState(question.id);

      if (state.submitted) return;

      if (question.type === "single") {
        state.selected = [index];
        state.submitted = true;
        renderQuestion();
        return;
      }

      if (question.type === "multiple") {
        if (state.selected.includes(index)) {
          state.selected = state.selected.filter(i => i !== index);
        } else {
          state.selected.push(index);
        }
        renderQuestion();
      }
    }

    function submitMultipleAnswer() {
      const question = quizData.questions[current];
      const state = getQuestionState(question.id);

      if (question.type !== "multiple") return;
      if (state.selected.length === 0) {
        alert(getUIText("selectAtLeastOne"));
        return;
      }

      state.submitted = true;
      renderQuestion();
    }

    function restartQuiz() {
      answersState = {};
      current = 0;
      showingFinal = false;
      renderQuestion();
    }

    function nextQuestion() {
      if (!quizData) return;
    
      if (showingFinal) {
        restartQuiz();
        return;
      }
    
      const question = quizData.questions[current];
      const state = getQuestionState(question.id);
    
      // 未作答，不可前往下一題
      if (!state.submitted) {
        alert(getUIText("answerBeforeNext"));
        return;
      }
    
      // 最後一題且已全部作答 → 顯示結果
      if (current === quizData.questions.length - 1) {
        showFinalResult();
        return;
      }
    
      current++;
      renderQuestion();
    }


    async function loadQuestions() {
      try {
        const response = await fetch("questions.json");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        quizData = await response.json();

        const urlLang = new URLSearchParams(window.location.search).get("lang");
        const supported = ["zh-HK", "zh-CN", "en"];
        if (supported.includes(urlLang)) {
          currentLang = urlLang;
        }

        renderQuestion();
      } catch (error) {
        document.body.innerHTML = `
          <div class="card">
            <div class="result wrong" style="display:block;">
              ❌ Failed to load quiz<br><br>
              <small>${error.message}</small>
            </div>
          </div>`;
        console.error(error);
      }
    }

    document.getElementById("langSelect").addEventListener("change", function () {
      currentLang = this.value;
      updateLanguageInUrl(currentLang);

      if (showingFinal) {
        applyLanguageUI();
        showFinalResult();
      } else {
        renderQuestion();
      }
    });

    document.getElementById("checkBtn").addEventListener("click", submitMultipleAnswer);
    document.getElementById("nextBtn").addEventListener("click", nextQuestion);

    loadQuestions();
  </script>
</body>
</html>
