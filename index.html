<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .card {
      background: white;
      padding: 28px;
      border-radius: 16px;
      max-width: 780px;
      margin: 30px auto;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      background: #fff3cd;
      color: #856404;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .lang-box {
      text-align: right;
    }

    .lang-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }

    select {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      background: white;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 34px;
      line-height: 1.2;
    }

    .intro {
      font-size: 16px;
      line-height: 1.7;
      color: #555;
      margin-bottom: 28px;
    }

    .meta {
      font-size: 14px;
      color: #777;
      margin-bottom: 8px;
    }

    .question-title {
      font-size: 26px;
      margin: 0 0 10px 0;
    }

    .scenario {
      font-size: 20px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .option-btn {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      font-size: 18px;
      transition: 0.2s ease;
      text-align: center;
    }

    .option-btn:hover {
      background: #f3f3f3;
    }

    .option-btn:disabled {
      cursor: default;
      opacity: 0.9;
    }

    .result {
      margin-top: 22px;
      padding: 16px;
      border-radius: 10px;
      line-height: 1.8;
      font-size: 16px;
      display: none;
    }

    .correct {
      background: #d4edda;
      color: #155724;
      border: 1px solid #b7dfbf;
      display: block;
    }

    .wrong {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #efb5ba;
      display: block;
    }

    .info {
      background: #e8f4fd;
      color: #0c5460;
      border: 1px solid #b8daff;
      display: block;
    }

    .reminder {
      margin-top: 8px;
      font-weight: bold;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .nav-btn {
      flex: 1;
      min-width: 120px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .nav-btn.primary {
      background: #0078d4;
      color: white;
    }

    .nav-btn.primary:hover {
      background: #106ebe;
    }

    .nav-btn.secondary {
      background: #eaeaea;
      color: #333;
    }

    .nav-btn.secondary:hover {
      background: #dcdcdc;
    }

    .summary {
      margin-top: 24px;
      font-size: 15px;
      color: #666;
      text-align: right;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 14px;
      color: #666;
      text-align: center;
      border-top: 1px solid #eee;
      padding-top: 16px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
      }

      .question-title {
        font-size: 22px;
      }

      .scenario {
        font-size: 18px;
      }

      .option-btn {
        font-size: 16px;
      }

      .lang-box {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <div>
        <div class="badge" id="badge"></div>
      </div>

      <div class="lang-box">
        <div class="lang-label" id="langLabel">Language / 語言 / 语言</div>
        <select id="langSelect">
          <option value="zh-HK">繁體中文</option>
          <option value="zh-CN">简体中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </div>

    <h1 id="siteTitle"></h1>
    <div class="intro" id="intro"></div>

    <div class="meta" id="meta"></div>
    <h2 class="question-title" id="title"></h2>
    <div class="scenario" id="question"></div>

    <div id="answers"></div>
    <div id="result" class="result"></div>

    <div class="controls">
      <button class="nav-btn secondary" id="prevBtn"></button>
      <button class="nav-btn primary" id="nextBtn"></button>
    </div>

    <div class="summary" id="summary"></div>
    <div id="finalResult" class="result"></div>

    <div class="footer-note" id="footer"></div>
  </div>

  <script>
    let quizData = null;
    let currentLang = "zh-HK";
    let current = 0;
    let answeredSelections = {};
    let showingFinal = false;

    function getScore() {
      if (!quizData) return 0;
      let score = 0;
      quizData.questions.forEach(q => {
        const sel = answeredSelections[q.id];
        if (sel !== undefined && q.options[sel] && q.options[sel].correct) {
          score++;
        }
      });
      return score;
    }

    function getAnsweredCount() {
      return Object.keys(answeredSelections).length;
    }

    function allAnswered() {
      return quizData && getAnsweredCount() === quizData.questions.length;
    }

    function getUIText(key) {
      return quizData.ui[currentLang][key];
    }

    function updateLanguageInUrl(lang) {
      const url = new URL(window.location);
      url.searchParams.set("lang", lang);
      window.history.replaceState({}, "", url);
    }

    function applyLanguageUI() {
      const ui = quizData.ui[currentLang];
      document.title = ui.siteTitle;
      document.documentElement.lang = currentLang;

      document.getElementById("badge").innerText = ui.badge;
      document.getElementById("siteTitle").innerText = ui.siteTitle;
      document.getElementById("intro").innerText = ui.intro;
      document.getElementById("prevBtn").innerText = ui.prev;
      document.getElementById("nextBtn").innerText = ui.next;
      document.getElementById("footer").innerText = ui.footer;
      document.getElementById("langSelect").value = currentLang;
      document.getElementById("langLabel").innerText = ui.langLabel || "Language / 語言 / 语言";
    }

    function updateSummary() {
      const score = getScore();
      document.getElementById("summary").innerHTML = `${getUIText("scoreLabel")}：${score} / ${quizData.questions.length}`;
    }

    function hideResult() {
      const box = document.getElementById("result");
      box.className = "result";
      box.innerHTML = "";
      box.style.display = "none";
    }

    function showResult(q, selectedIndex) {
      const selected = q.options[selectedIndex];
      const resultBox = document.getElementById("result");

      if (selected.correct) {
        resultBox.className = "result correct";
        resultBox.innerHTML = `
          ${getUIText("correctLabel")}<br>
          ${q.explanation[currentLang]}
          <div class="reminder">${getUIText("reminderLabel")}：${q.reminder[currentLang]}</div>
        `;
      } else {
        resultBox.className = "result wrong";
        resultBox.innerHTML = `
          ${getUIText("wrongLabel")}<br>
          ${q.explanation[currentLang]}
          <div class="reminder">${getUIText("reminderLabel")}：${q.reminder[currentLang]}</div>
        `;
      }

      resultBox.style.display = "block";
    }

    function disableCurrentOptions() {
      const buttons = document.querySelectorAll("#answers .option-btn");
      buttons.forEach(btn => btn.disabled = true);
    }

    function enableCurrentOptions() {
      const buttons = document.querySelectorAll("#answers .option-btn");
      buttons.forEach(btn => btn.disabled = false);
    }

    function getEncouragementMessage() {
      const total = quizData.questions.length;
      const score = getScore();
      const ratio = score / total;

      if (score === total) {
        return quizData.messages.perfect[currentLang];
      } else if (ratio >= 0.7) {
        return quizData.messages.pass70[currentLang];
      } else {
        return quizData.messages.below70[currentLang];
      }
    }

    function showFinalResult() {
      const box = document.getElementById("finalResult");
      if (!box) return;

      showingFinal = true;

      document.getElementById("meta").innerHTML = "";
      document.getElementById("title").innerHTML = getUIText("resultTitle");
      document.getElementById("question").innerHTML = "";
      document.getElementById("answers").innerHTML = "";
      hideResult();

      const total = quizData.questions.length;
      const score = getScore();
      const scorePercent = Math.round((score / total) * 100);

      box.className = "result info";
      box.innerHTML = `
        <strong>${getUIText("resultTitle")}</strong><br>
        ${getUIText("scoreLabel")}：${score} / ${total} (${scorePercent}%)<br><br>
        ${getEncouragementMessage()}
      `;
      box.style.display = "block";

      document.getElementById("prevBtn").innerText = getUIText("restart");
      document.getElementById("nextBtn").innerText = getUIText("restart");
      updateSummary();
    }

    function hideFinalResult() {
      const box = document.getElementById("finalResult");
      if (!box) return;

      box.className = "result";
      box.innerHTML = "";
      box.style.display = "none";
      showingFinal = false;
    }

    function renderQuestion() {
      const q = quizData.questions[current];
      if (!q) return;

      hideFinalResult();
      applyLanguageUI();

      const questionLabel = getUIText("questionLabel")
        .replace("{current}", current + 1)
        .replace("{total}", quizData.questions.length);

      document.getElementById("meta").innerHTML = `${questionLabel} ・ ${q.category[currentLang]}`;
      document.getElementById("title").innerHTML = q.title[currentLang];
      document.getElementById("question").innerHTML = q.scenario[currentLang];

      const alreadyAnswered = answeredSelections[q.id] !== undefined;

      let html = "";
      q.options.forEach((opt, i) => {
        html += `
          <button class="option-btn" onclick="checkAnswer(${i})" ${alreadyAnswered ? "disabled" : ""}>
            ${opt.text[currentLang]}
          </button>
        `;
      });
      document.getElementById("answers").innerHTML = html;

      if (alreadyAnswered) {
        showResult(q, answeredSelections[q.id]);
        disableCurrentOptions();
      } else {
        hideResult();
        enableCurrentOptions();
      }

      updateSummary();
    }

    function checkAnswer(index) {
      const q = quizData.questions[current];
      if (answeredSelections[q.id] !== undefined) return;

      answeredSelections[q.id] = index;
      showResult(q, index);
      disableCurrentOptions();
      updateSummary();

      if (allAnswered()) {
        document.getElementById("nextBtn").innerText = getUIText("finish");
      }
    }

    function restartQuiz() {
      answeredSelections = {};
      current = 0;
      showingFinal = false;
      renderQuestion();
    }

    function nextQuestion() {
      if (!quizData) return;

      if (showingFinal) {
        restartQuiz();
        return;
      }

      if (allAnswered() && current === quizData.questions.length - 1) {
        showFinalResult();
        return;
      }

      if (current < quizData.questions.length - 1) {
        current++;
        renderQuestion();
      } else {
        if (allAnswered()) {
          showFinalResult();
        } else {
          current = 0;
          renderQuestion();
        }
      }
    }

    function prevQuestion() {
      if (!quizData) return;

      if (showingFinal) {
        restartQuiz();
        return;
      }

      if (current > 0) {
        current--;
      } else {
        current = quizData.questions.length - 1;
      }

      renderQuestion();
    }

    async function loadQuestions() {
      try {
        const response = await fetch("questions.json");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        quizData = await response.json();

        const urlLang = new URLSearchParams(window.location.search).get("lang");
        const supported = ["zh-HK", "zh-CN", "en"];
        if (supported.includes(urlLang)) {
          currentLang = urlLang;
        }

        renderQuestion();
      } catch (error) {
        document.body.innerHTML = `
          <div class="card">
            <div class="result wrong" style="display:block;">
              ❌ Failed to load quiz<br><br>
              <small>${error.message}</small>
            </div>
          </div>`;
        console.error(error);
      }
    }

    document.getElementById("langSelect").addEventListener("change", function () {
      currentLang = this.value;
      updateLanguageInUrl(currentLang);

      if (showingFinal) {
        applyLanguageUI();
        showFinalResult();
      } else {
        renderQuestion();
      }
    });

    document.getElementById("nextBtn").addEventListener("click", nextQuestion);
    document.getElementById("prevBtn").addEventListener("click", prevQuestion);

    loadQuestions();
  </script>
</body>
</html>
