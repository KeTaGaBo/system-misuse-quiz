<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <!-- HUB_LAUNCHER_20260624_v3 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOKSS Awareness Hub</title>
  <meta name="description" content="BOKSS Awareness Hub - 資安與私隱教育測驗目錄">
  <link rel="stylesheet" href="style.css">
  <script src="hub.js" defer></script>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="topbar">
        <div class="brand-wrap">
          <div class="badge" id="hubBadge">BOKSS Awareness Hub</div>
          <h1 class="hero-title" id="hubTitle">請選擇一個測驗開始</h1>
          <div class="hero-subtitle" id="hubSubtitle">資安與私隱學習目錄</div>
        </div>

        <div class="lang-box">
          <label class="lang-label" id="langLabel" for="langSelect">Language / 語言 / 语言</label>
          <select id="langSelect" aria-label="Language selector">
            <option value="zh-HK">繁體中文</option>
            <option value="zh-CN">简体中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <p class="intro" id="hubIntro">
        這裡集合了不同主題的資安及私隱教育測驗。你可按需要選擇合適的測驗開始，並持續留意最新更新。
      </p>

      <div class="search-panel">
        <div class="search-input-wrap">
          <span class="search-icon" aria-hidden="true">🔎</span>
          <input
            id="hubSearch"
            class="search-input"
            type="search"
            placeholder="搜尋測驗標題或簡介"
            autocomplete="off"
          >
        </div>

        <div class="search-meta">
          <span class="search-meta-label" id="resultCountLabel">顯示結果</span>
          <span class="search-meta-value" id="resultCount">0</span>
        </div>
      </div>
    </header>

    <section class="launcher-section">
      <div class="section-title" id="sectionTitle">應用目錄</div>

      <div id="quizList" class="quiz-grid">
        <div class="loading-box" id="loadingBox">載入中...</div>
      </div>
    </section>

    <footer class="footer" id="hubFooter">
      <div class="footer-brand-row">
        <a
          class="footer-brand-link"
          href="https://bokss.org.hk"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Visit BOKSS official website"
        >
          <img
            src="ITD_Logo.png"
            alt="Baptist Oi Kwan Social Service Information Technology Department"
            class="footer-logo"
          >
        </a>

        <a
          class="footer-site-link"
          href="https://bokss.org.hk"
          target="_blank"
          rel="noopener noreferrer"
        >
          bokss.org.hk
        </a>
      </div>

      <div class="footer-copy">
        © 2026 Baptist Oi Kwan Social Service (BOKSS). All rights reserved.
      </div>

      <small id="hubFooterSub">Awareness Hub · Cybersecurity & Privacy Education</small>
    </footer>
  </div>
</body>
</html>
